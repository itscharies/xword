<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Crossword</title>
    <!--
      GitHub Pages has no server-side SPA routing, so a deep link like
      /xword/gdn-cryptic/20260615 lands here. Encode the path into a query and
      bounce to the app root; index.html decodes it back. (rafgraph/spa-github-pages)
      pathSegmentsToKeep = 1 keeps the "/xword/" project-site segment.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
