<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#000000" />
  <!-- 3x3 mini crossword: light cells, one accent, one blocked (center) -->
  <g fill="#ededed">
    <rect x="3" y="3" width="8" height="8" />
    <rect x="12" y="3" width="8" height="8" />
    <rect x="21" y="3" width="8" height="8" />
    <rect x="3" y="12" width="8" height="8" />
    <rect x="21" y="12" width="8" height="8" />
    <rect x="3" y="21" width="8" height="8" />
    <rect x="12" y="21" width="8" height="8" />
    <rect x="21" y="21" width="8" height="8" />
  </g>
  <!-- accent + blocked square -->
  <rect x="3" y="3" width="8" height="8" fill="#ffe500" />
  <rect x="12" y="12" width="8" height="8" fill="#1a1a1a" />
</svg>
