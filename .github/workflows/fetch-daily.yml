name: Fetch daily puzzle

on:
  schedule:
    # The syndicator publishes a given day's puzzle the evening before in UTC
    # (e.g. Jun 28's puzzle is live by ~23:00 UTC on Jun 27). A 5am-Sydney run
    # (19:00 UTC) fired too early and always missed the current day's puzzle, so
    # run after publication: 23:00 UTC (~9am Sydney AEST) with a 02:00 UTC
    # (~12pm) backstop for late publication. No-op runs don't commit.
    - cron: "0 23 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch new puzzles
        run: npm run fetch

      - name: Commit new puzzles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzles
          if git diff --cached --quiet; then
            echo "No new puzzles."
          else
            git commit -m "Add puzzles ($(date -u +%Y-%m-%d))"
            git push
          fi
