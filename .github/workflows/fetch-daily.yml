name: Fetch daily puzzle

on:
  schedule:
    # Run a few times a day (UTC) so a new puzzle is picked up soon after it
    # appears on the source, regardless of timezone.
    - cron: "0 13 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch new puzzles
        run: npm run fetch

      - name: Commit new puzzles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzles
          if git diff --cached --quiet; then
            echo "No new puzzles."
          else
            git commit -m "Add puzzles ($(date -u +%Y-%m-%d))"
            git push
          fi
