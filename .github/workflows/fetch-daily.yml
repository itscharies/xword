name: Fetch daily puzzle

on:
  schedule:
    # The syndicator publishes a given day's puzzle the evening before in UTC —
    # usually live around 20:00 UTC (~6am Sydney AEST), but the exact time
    # drifts day to day. Rather than guess a single time, poll hourly from
    # 19:00–23:00 UTC (~5am–9am Sydney) and grab it the moment it lands. The
    # first run that finds the puzzle commits; the rest are no-ops (git diff
    # guard), so the extra runs cost nothing.
    - cron: "0 19-23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch new puzzles
        run: npm run fetch

      - name: Commit new puzzles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzles
          if git diff --cached --quiet; then
            echo "No new puzzles."
          else
            git commit -m "Add puzzles ($(date -u +%Y-%m-%d))"
            git push
          fi
