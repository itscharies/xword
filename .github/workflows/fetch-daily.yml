name: Fetch daily puzzle

on:
  schedule:
    # The NYT source publishes the next day's puzzle ~20:00-23:00 UTC, which is
    # ~6-9am Sydney — right around wake-up. GitHub's scheduled runs are delayed
    # and irregular (often 30-50 min late, sometimes skipped), so poll every
    # 10 min through that window to catch it as soon as it lands, and hourly
    # the rest of the day. A run with nothing new makes no commit (git-diff
    # guard below) and so never deploys; only a new puzzle triggers a build.
    - cron: "*/10 19-23 * * *" # every 10 min, ~5-10am Sydney
    - cron: "0 0-18 * * *" # hourly the rest of the day
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: fetch-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch new puzzles
        run: npm run fetch

      - name: Commit new puzzles
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzles
          if git diff --cached --quiet; then
            echo "No new puzzles."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Add puzzles ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Only redeploy when we actually committed a puzzle — a bot push with
      # GITHUB_TOKEN can't trigger deploy's `push` event, so dispatch it here.
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
