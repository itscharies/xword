name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # The daily fetch commits with GITHUB_TOKEN, which can't trigger the push
  # event above — so redeploy when that workflow finishes instead.
  workflow_run:
    workflows: ["Fetch daily puzzle"]
    types: [completed]
  workflow_dispatch: {}

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # For fetch-triggered runs, only deploy if the fetch actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      # Always build the latest main — for workflow_run the event SHA predates
      # the fetch's commit, so pin to the branch tip.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
