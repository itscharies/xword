<!doctype html>
<html lang="en" data-theme="dark" data-accent="yellow">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1c1c1c" />
    <title>The Daily Grid — every day's crosswords in one place</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <meta
      name="description"
      content="The day's crosswords from the New York Times, LA Times, Seattle Times, Guardian and New Yorker — minis, cryptics and full grids — in one clean, ad-free place."
    />

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Daily Grid" />
    <meta property="og:title" content="The Daily Grid — every day's crosswords in one place" />
    <meta
      property="og:description"
      content="Crosswords from the NYT, LA Times, Seattle Times, Guardian and New Yorker — minis, cryptics and full grids — in one clean, ad-free place."
    />
    <meta property="og:url" content="https://itscharies.github.io/xword/" />
    <meta property="og:image" content="https://itscharies.github.io/xword/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Daily Grid — every day's crosswords in one place" />
    <meta
      name="twitter:description"
      content="Crosswords from the NYT, LA Times, Seattle Times, Guardian and New Yorker — clean and ad-free."
    />
    <meta name="twitter:image" content="https://itscharies.github.io/xword/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SN+Pro:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Display font for the "The Daily Grid" brand title. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&display=swap"
      rel="stylesheet"
    />
    <script>
      // Decode the path that 404.html stashed in the query string, so deep
      // links (/xword/gdn-cryptic/20260615) restore to a clean URL before the
      // app reads window.location. (rafgraph/spa-github-pages)
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
    <script>
      // Apply saved theme/accent before paint to avoid a flash.
      try {
        var t = localStorage.getItem("xword:theme");
        var a = localStorage.getItem("xword:accent");
        if (t) document.documentElement.dataset.theme = t;
        if (a) document.documentElement.dataset.accent = a;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
