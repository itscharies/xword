<!doctype html>
<html lang="en" data-theme="dark" data-accent="yellow">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Crossword — the daily NYT puzzle, free</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <meta
      name="description"
      content="Play the daily New York Times crossword in a clean, high-contrast, ad-free interface. Solve on desktop or mobile, with checking, reveals and a growing archive."
    />

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crossword" />
    <meta property="og:title" content="Crossword — the daily NYT puzzle, free" />
    <meta
      property="og:description"
      content="Play the daily New York Times crossword in a clean, high-contrast, ad-free interface — with checking, reveals and a growing archive."
    />
    <meta property="og:url" content="https://itscharies.github.io/xword/" />
    <meta property="og:image" content="https://itscharies.github.io/xword/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crossword — the daily NYT puzzle, free" />
    <meta
      name="twitter:description"
      content="Play the daily New York Times crossword — clean, high-contrast and ad-free."
    />
    <meta name="twitter:image" content="https://itscharies.github.io/xword/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SN+Pro:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme/accent before paint to avoid a flash.
      try {
        var t = localStorage.getItem("xword:theme");
        var a = localStorage.getItem("xword:accent");
        if (t) document.documentElement.dataset.theme = t;
        if (a) document.documentElement.dataset.accent = a;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
