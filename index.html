<!doctype html>
<html lang="en" data-theme="dark" data-accent="yellow">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Crossword</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SN+Pro:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme/accent before paint to avoid a flash.
      try {
        var t = localStorage.getItem("xword:theme");
        var a = localStorage.getItem("xword:accent");
        if (t) document.documentElement.dataset.theme = t;
        if (a) document.documentElement.dataset.accent = a;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
